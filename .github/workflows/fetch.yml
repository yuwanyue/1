name: fetch-proxy
on:
workflow_dispatch:
inputs:
url:
description: "target url"
required: true
type: string

jobs:
fetch:
runs-on: ubuntu-latest
steps:
- name: Fetch target
env:
URL: ${{ inputs.url }}
run: |
set -e
mkdir -p out
ts=$(date -u +%Y%m%dT%H%M%SZ)
echo "{\"url\":\"$URL\",\"time\":\"$ts\"}" > out/meta.json
# 抓取响应头+响应体
curl -L --max-time 60 --connect-timeout 10 \
-D out/headers.txt \
-o out/body.bin \
"$URL" || true
tar -czf result.tgz -C out .

- name: Upload artifact
uses: actions/upload-artifact@v4
with:
name: fetch-result
path: result.tgz
retention-days: 1
