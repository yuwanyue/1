name: egress-fetch

run-name: egress-fetch ${{ inputs.request_id || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      url:
        description: target url
        required: true
        type: string
      method:
        description: GET/POST...
        required: false
        default: GET
        type: string
      body_b64:
        description: base64 request body (optional)
        required: false
        default: ""
        type: string
      mode:
        description: fetch | screenshot | browser | shell
        required: false
        default: fetch
        type: string
      browser_script_b64:
        description: base64 JS snippet (async) for advanced Playwright actions
        required: false
        default: ""
        type: string
      terminal_cmd_b64:
        description: base64 shell command to run with bash -lc
        required: false
        default: ""
        type: string
      browser_wait_ms:
        description: extra wait time after goto (ms)
        required: false
        default: "3000"
        type: string
      browser_headless:
        description: true/false for Playwright launch
        required: false
        default: "true"
        type: string
      request_id:
        description: caller-generated id for polling the correct run
        required: false
        default: ""
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: read
    env:
      URL: ${{ inputs.url }}
      METHOD: ${{ inputs.method }}
      BODY_B64: ${{ inputs.body_b64 }}
      MODE: ${{ inputs.mode }}
      REQUEST_ID: ${{ inputs.request_id }}
      BROWSER_SCRIPT_B64: ${{ inputs.browser_script_b64 }}
      TERMINAL_CMD_B64: ${{ inputs.terminal_cmd_b64 }}
      BROWSER_WAIT_MS: ${{ inputs.browser_wait_ms }}
      BROWSER_HEADLESS: ${{ inputs.browser_headless }}
      PLAYWRIGHT_VERSION: 1.55.0
      npm_config_cache: ${{ github.workspace }}/npm-cache
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-cache
    steps:
      - name: Prepare output
        shell: bash {0}
        run: |
          set -u -o pipefail
          mkdir -p out
          ts=$(date -u +%Y%m%dT%H%M%SZ)
          printf '{"url":"%s","method":"%s","mode":"%s","time":"%s","run_id":"%s","request_id":"%s"}\n' \
            "$URL" "$METHOD" "$MODE" "$ts" "${GITHUB_RUN_ID}" "$REQUEST_ID" > out/meta.json
          : > out/error.txt
          : > out/browser_console.log
          echo "step=prepare" > out/step-marker.txt
          echo '{"exit_code":0}' > out/command.json

      - name: Cache npm
        if: ${{ inputs.mode == 'screenshot' || inputs.mode == 'browser' }}
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/npm-cache
          key: npm-cache-${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Cache Playwright browsers
        if: ${{ inputs.mode == 'screenshot' || inputs.mode == 'browser' }}
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/playwright-cache
          key: playwright-cache-${{ runner.os }}-chromium-${{ env.PLAYWRIGHT_VERSION }}

      - name: Browser capture
        if: ${{ inputs.mode == 'screenshot' || inputs.mode == 'browser' }}
        continue-on-error: true
        shell: bash {0}
        run: |
          set -u -o pipefail
          echo "step=browser_begin" >> out/step-marker.txt
          {
            echo "== browser setup =="
            echo "pwd=$(pwd)"
            command -v node || true
            command -v npm || true
            command -v npx || true
            node -v || true
            npm -v || true
          } >> out/error.txt 2>&1

          sudo apt-get update >> out/error.txt 2>&1 || true
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei fontconfig xvfb >> out/error.txt 2>&1 || true
          fc-cache -fv >> out/error.txt 2>&1 || true
          fc-match "Noto Sans CJK SC" >> out/error.txt 2>&1 || true
          echo "step=browser_fonts_ready" >> out/step-marker.txt

          if [ ! -f package.json ]; then
            npm init -y >> out/error.txt 2>&1 || true
          fi
          npm install "playwright@${PLAYWRIGHT_VERSION}" >> out/error.txt 2>&1 || true
          npx playwright install chromium >> out/error.txt 2>&1 || true
          echo "step=browser_runtime_ready" >> out/step-marker.txt

          cat > out/capture.mjs <<'EOF'
          import fs from "node:fs";
          import path from "node:path";
          import { chromium } from "playwright";

          const outDir = "out";
          const url = process.env.URL;
          const waitMs = Number.parseInt(process.env.BROWSER_WAIT_MS || "3000", 10);
          const browserScriptB64 = process.env.BROWSER_SCRIPT_B64 || "";
          const headless = (process.env.BROWSER_HEADLESS || "true").toLowerCase() !== "false";

          const consoleLogs = [];
          let status = "unknown";
          let finalUrl = url;
          let title = "";
          let htmlPath = "";
          let scriptResult = null;
          let scriptError = "";
          let error = "";

          const marker = (name) => fs.appendFileSync(`${outDir}/step-marker.txt`, `${name}\n`, "utf8");
          marker("step=node_script_start");

          try {
            const browser = await chromium.launch({ headless });
            const context = await browser.newContext({
              viewport: { width: 1440, height: 1080 },
              locale: "zh-CN",
              timezoneId: "Asia/Shanghai",
            });

            await context.addInitScript(() => {
              const style = document.createElement("style");
              style.textContent = `
                html, body, input, textarea, button, select {
                  font-family: "Noto Sans CJK SC", "WenQuanYi Zen Hei", "Microsoft YaHei", "PingFang SC", "Heiti SC", sans-serif !important;
                }
              `;
              document.documentElement.appendChild(style);
            });

            const page = await context.newPage();
            page.on("console", (msg) => {
              try {
                consoleLogs.push(`[${msg.type()}] ${msg.text()}`);
              } catch {
                consoleLogs.push("[console] <unavailable>");
              }
            });

            await context.tracing.start({ screenshots: true, snapshots: true, sources: true });
            marker("step=node_browser_launched");

            try {
              const response = await page.goto(url, { waitUntil: "domcontentloaded", timeout: 120000 });
              if (response) status = String(response.status());
              if (Number.isFinite(waitMs) && waitMs > 0) {
                await page.waitForTimeout(waitMs);
              }

              if (browserScriptB64) {
                try {
                  const script = Buffer.from(browserScriptB64, "base64").toString("utf8");
                  const fn = new Function(
                    "ctx",
                    `"use strict"; return (async () => { ${script}\n })();`,
                  );
                  const rawResult = await fn({ page, context, browser, fs, path, console });
                  if (typeof rawResult === "undefined") {
                    scriptResult = null;
                  } else if (typeof rawResult === "string" || typeof rawResult === "number" || typeof rawResult === "boolean") {
                    scriptResult = rawResult;
                  } else {
                    scriptResult = JSON.parse(JSON.stringify(rawResult));
                  }
                } catch (err) {
                  scriptError = err instanceof Error ? err.stack || err.message : String(err);
                }
              }

              finalUrl = page.url();
              title = await page.title();
              marker("step=node_page_loaded");
              await page.screenshot({ path: `${outDir}/screenshot.png`, fullPage: true });
              const html = await page.content();
              htmlPath = `${outDir}/page.html`;
              fs.writeFileSync(htmlPath, html, "utf8");
              marker("step=node_screenshot_written");
            } catch (err) {
              error = err instanceof Error ? err.stack || err.message : String(err);
              try {
                await page.screenshot({ path: `${outDir}/screenshot.error.png`, fullPage: true });
              } catch {
                // ignore
              }
            } finally {
              try {
                await context.tracing.stop({ path: `${outDir}/trace.zip` });
              } catch (err) {
                if (!error) error = err instanceof Error ? err.message : String(err);
              }
              await browser.close();
            }
          } catch (err) {
            error = err instanceof Error ? err.stack || err.message : String(err);
          }

          fs.writeFileSync(
            `${outDir}/page.json`,
            JSON.stringify(
              {
                title,
                final_url: finalUrl,
                status,
                script_result: scriptResult,
                script_error: scriptError,
                error,
                html_path: htmlPath,
              },
              null,
              2,
            ),
          );
          fs.writeFileSync(`${outDir}/status_code.txt`, `${status}\n`);
          fs.writeFileSync(
            `${outDir}/headers.txt`,
            [
              `mode=${process.env.MODE || "browser"}`,
              `final_url=${finalUrl}`,
              `title=${title}`,
              `script_error=${scriptError}`,
              `error=${error}`,
            ].join("\n") + "\n",
          );
          fs.writeFileSync(`${outDir}/browser_console.log`, consoleLogs.join("\n"), "utf8");
          if (error || scriptError) {
            fs.appendFileSync(`${outDir}/error.txt`, `${error}\n${scriptError}\n`, "utf8");
          }
          marker("step=node_script_done");
          EOF

          if [ "${BROWSER_HEADLESS:-true}" = "false" ]; then
            xvfb-run -a node out/capture.mjs >> out/error.txt 2>&1 || true
          else
            node out/capture.mjs >> out/error.txt 2>&1 || true
          fi
          echo "step=browser_step_done" >> out/step-marker.txt

      - name: HTTP fetch
        if: ${{ inputs.mode == 'fetch' }}
        continue-on-error: true
        shell: bash {0}
        run: |
          set -u -o pipefail
          echo "step=fetch_begin" >> out/step-marker.txt
          if [ -n "$BODY_B64" ]; then
            echo "$BODY_B64" | base64 -d > out/req_body.bin || true
            curl -sS -L -X "$METHOD" \
              --connect-timeout 15 --max-time 120 \
              --data-binary @out/req_body.bin \
              -D out/headers.txt -o out/body.bin "$URL" >> out/error.txt 2>&1 || true
          else
            curl -sS -L -X "$METHOD" \
              --connect-timeout 15 --max-time 120 \
              -D out/headers.txt -o out/body.bin "$URL" >> out/error.txt 2>&1 || true
          fi
          code=$(awk 'BEGIN{c=""} /^HTTP/{c=$2} END{print c}' out/headers.txt 2>/dev/null || true)
          echo "${code:-unknown}" > out/status_code.txt
          echo "step=fetch_done" >> out/step-marker.txt

      - name: Terminal command
        if: ${{ inputs.terminal_cmd_b64 != '' }}
        continue-on-error: true
        shell: bash {0}
        run: |
          set -u -o pipefail
          echo "step=terminal_begin" >> out/step-marker.txt
          echo "$TERMINAL_CMD_B64" | base64 -d > out/terminal_command.sh 2>> out/error.txt || true
          chmod +x out/terminal_command.sh || true
          cmd_exit=0
          cmd_timed_out=false
          if [ -s out/terminal_command.sh ]; then
            timeout --signal=TERM 900 bash -lc "$(cat out/terminal_command.sh)" > out/terminal_stdout.txt 2> out/terminal_stderr.txt || cmd_exit=$?
            if [ "${cmd_exit:-0}" = "124" ]; then
              cmd_timed_out=true
            fi
          fi
          printf '{"exit_code":%s,"timed_out":%s}\n' "${cmd_exit:-0}" "${cmd_timed_out}" > out/command.json
          echo "step=terminal_done" >> out/step-marker.txt

      - name: Finalize output
        if: always()
        shell: bash {0}
        run: |
          set -u -o pipefail
          [ -f out/status_code.txt ] || echo "unknown" > out/status_code.txt
          [ -f out/headers.txt ] || : > out/headers.txt
          [ -f out/body.bin ] || : > out/body.bin
          [ -f out/page.json ] || printf '{"title":"","final_url":"%s","error":"capture did not create page.json"}\n' "$URL" > out/page.json
          [ -f out/meta.json ] || echo '{}' > out/meta.json
          [ -f out/command.json ] || echo '{"exit_code":0}' > out/command.json
          [ -f out/browser_console.log ] || : > out/browser_console.log
          [ -f out/terminal_stdout.txt ] || : > out/terminal_stdout.txt
          [ -f out/terminal_stderr.txt ] || : > out/terminal_stderr.txt
          [ -f out/terminal_command.sh ] || : > out/terminal_command.sh
          [ -f out/error.txt ] || : > out/error.txt
          [ -f out/step-marker.txt ] || echo 'step=finalize_only' > out/step-marker.txt
          echo "step=finalize_done" >> out/step-marker.txt
          tar -czf result.tgz -C out .

      - name: Upload workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: egress-result-${{ github.run_id }}
          path: result.tgz
          if-no-files-found: warn

      - name: Create release tag
        id: vars
        run: |
          echo "tag=run-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Publish release with asset
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          files: result.tgz
