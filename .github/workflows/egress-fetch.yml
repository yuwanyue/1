name: egress-fetch

run-name: egress-fetch ${{ inputs.request_id || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      url:
        description: target url
        required: true
        type: string
      method:
        description: GET/POST...
        required: false
        default: GET
        type: string
      body_b64:
        description: base64 request body (optional)
        required: false
        default: ""
        type: string
      mode:
        description: fetch or screenshot
        required: false
        default: fetch
        type: string
      request_id:
        description: caller-generated id for polling the correct run
        required: false
        default: ""
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch target
        env:
          URL: ${{ inputs.url }}
          METHOD: ${{ inputs.method }}
          BODY_B64: ${{ inputs.body_b64 }}
          MODE: ${{ inputs.mode }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: |
          set -euo pipefail
          mkdir -p out
          ts=$(date -u +%Y%m%dT%H%M%SZ)
          printf '{"url":"%s","method":"%s","mode":"%s","time":"%s","run_id":"%s","request_id":"%s"}\n' \
            "$URL" "$METHOD" "$MODE" "$ts" "${GITHUB_RUN_ID}" "$REQUEST_ID" > out/meta.json

          if [ "$MODE" = "screenshot" ]; then
            npm init -y >/dev/null 2>&1
            npm install playwright >/dev/null 2>&1
            npx playwright install chromium >/dev/null 2>&1
            cat > out/capture.mjs <<'EOF'
            import fs from "node:fs";
            import { chromium } from "playwright";

            const url = process.env.URL;
            const outDir = "out";
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1080 } });
            let status = "unknown";
            let finalUrl = url;
            let title = "";
            let error = "";
            try {
              const response = await page.goto(url, { waitUntil: "domcontentloaded", timeout: 120000 });
              await page.waitForTimeout(3000);
              if (response) {
                status = String(response.status());
              }
              finalUrl = page.url();
              title = await page.title();
            } catch (err) {
              error = err instanceof Error ? err.message : String(err);
            } finally {
              try {
                await page.screenshot({ path: `${outDir}/screenshot.png`, fullPage: true });
              } catch (err) {
                if (!error) {
                  error = err instanceof Error ? err.message : String(err);
                }
              }
              await browser.close();
            }
            fs.writeFileSync(
              `${outDir}/page.json`,
              JSON.stringify({ title, final_url: finalUrl, error }, null, 2),
            );
            fs.writeFileSync(`${outDir}/status_code.txt`, `${status}\n`);
            fs.writeFileSync(`${outDir}/headers.txt`, `mode=screenshot\nfinal_url=${finalUrl}\nerror=${error}\n`);
            if (error) {
              fs.writeFileSync(`${outDir}/error.txt`, `${error}\n`);
            }
            EOF
            node out/capture.mjs
          else
            if [ -n "$BODY_B64" ]; then
              echo "$BODY_B64" | base64 -d > out/req_body.bin || true
              curl -sS -L -X "$METHOD" \
                --connect-timeout 15 --max-time 120 \
                --data-binary @out/req_body.bin \
                -D out/headers.txt -o out/body.bin "$URL" || true
            else
              curl -sS -L -X "$METHOD" \
                --connect-timeout 15 --max-time 120 \
                -D out/headers.txt -o out/body.bin "$URL" || true
            fi

            code=$(awk 'BEGIN{c=""} /^HTTP/{c=$2} END{print c}' out/headers.txt)
            echo "${code:-unknown}" > out/status_code.txt
          fi

          tar -czf result.tgz -C out .

      - name: Create release tag
        id: vars
        run: |
          echo "tag=run-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Publish release with asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          files: result.tgz
